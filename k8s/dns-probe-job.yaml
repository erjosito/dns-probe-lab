# dns-probe-job.yaml
# -----------------------------------------------------------------------------
# Kubernetes Job to run dns_probe.py from inside an AKS cluster (or any k8s).
#
# DEPLOY (two commands):
#
#   kubectl create namespace dns-probe
#   kubectl -n dns-probe create configmap dns-probe-script --from-file=dns_probe.py
#   kubectl apply -f dns-probe-job.yaml
#
# WATCH:
#
#   kubectl -n dns-probe logs -f job/dns-probe
#
# COLLECT THE JSONL WHEN DONE:
#
#   POD=$(kubectl -n dns-probe get pod -l job-name=dns-probe -o name)
#   kubectl -n dns-probe cp "${POD#pod/}:/var/log/probe/dns_probe.jsonl" \
#     ./dns_probe_$(kubectl -n dns-probe get $POD -o jsonpath='{.spec.nodeName}').jsonl
#
# Adjust VANTAGE, NAMES, INTERVAL, DURATION in the env: block below.
# Each cluster / VM / desktop should run with a UNIQUE --vantage label so you
# can correlate across vantage points later.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: dns-probe
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dns-probe
  namespace: dns-probe
spec:
  ttlSecondsAfterFinished: 604800       # auto-delete pod 7 days after completion
  backoffLimit: 0                       # never retry — we want a single clean run
  activeDeadlineSeconds: 100000         # ~27.7h (a bit over a 24h run)
  template:
    metadata:
      labels:
        app: dns-probe
    spec:
      restartPolicy: Never
      # Run on any Linux node; tolerate taints so it works on system pools too
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      containers:
        - name: probe
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          env:
            # ---- EDIT THESE PER DEPLOYMENT ----
            - name: VANTAGE
              value: "aks-westeurope-sandbox"
            - name: NAMES
              value: "db.example.com replica.db.example.com"
            - name: RTYPES
              value: "A AAAA SRV TXT NS"
            - name: INTERVAL
              value: "60"
            - name: DURATION
              value: "24h"
            - name: EXTRA_RESOLVERS
              # Space-separated list of LABEL=IP.
              # Leave empty unless you have specific extra resolvers to probe.
              # Example: "in-cluster-coredns=10.0.0.10 unbound-test=10.0.0.20"
              value: ""
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "[startup] installing dnspython..."
              pip install --quiet --no-cache-dir dnspython
              EXTRA_ARGS=""
              for r in $EXTRA_RESOLVERS; do
                EXTRA_ARGS="$EXTRA_ARGS --extra-resolver $r"
              done
              echo "[startup] launching probe (vantage=$VANTAGE)"
              exec python /opt/probe/dns_probe.py \
                --vantage "$VANTAGE" \
                --names $NAMES \
                --rtypes $RTYPES \
                --interval "$INTERVAL" \
                --duration "$DURATION" \
                --summary-interval 600 \
                --log-file /var/log/probe/dns_probe.jsonl \
                $EXTRA_ARGS
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: script
              mountPath: /opt/probe
              readOnly: true
            - name: logs
              mountPath: /var/log/probe
      volumes:
        - name: script
          configMap:
            name: dns-probe-script
            defaultMode: 0555
        - name: logs
          emptyDir: {}
